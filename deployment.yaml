apiVersion: apps/v1
kind: Deployment

metadata:
  name: rag-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: rag

  template:
    metadata:
      labels:
        app: rag

    spec:
      containers:
      - name: rag
        image: saitejakorla/enterprise-rag:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 8501

        env:
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: rag-secret
              key: GOOGLE_API_KEY

        - name: APP_NAME
          valueFrom:
            configMapKeyRef:
              name: rag-config
              key: APP_NAME

        - name: MODEL_NAME
          valueFrom:
            configMapKeyRef:
              name: rag-config
              key: MODEL_NAME

        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: rag-config
              key: PORT

        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: rag-config
              key: LOG_LEVEL