env:
- name: GOOGLE_API_KEY
  valueFrom:
    secretKeyRef:
      name: rag-secret
      key: GOOGLE_API_KEY

- name: APP_NAME
  valueFrom:
    configMapKeyRef:
      name: rag-config
      key: APP_NAME

- name: MODEL_NAME
  valueFrom:
    configMapKeyRef:
      name: rag-config
      key: MODEL_NAME

- name: PORT
  valueFrom:
    configMapKeyRef:
      name: rag-config
      key: PORT

- name: LOG_LEVEL
  valueFrom:
    configMapKeyRef:
      name: rag-config
      key: LOG_LEVEL